apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pipelines
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: hhttps://github.com/moj-incub-auth/moj-vector-data.git
    targetRevision: main
    path: 'deploy/openshift/pipelines'
  destination:
    name: in-cluster
  #server: https://kubernetes.default.svc
    namespace: 'moj-builder'
  syncPolicy:
    automated: 
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true