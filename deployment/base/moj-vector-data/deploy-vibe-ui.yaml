apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vibe-ui
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/moj-incub-auth/vibe-ui.git
    targetRevision: main
    path: 'k8s'
  destination:
    name: in-cluster
    namespace: 'moj-vector-data'
  syncPolicy:
    automated: 
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true